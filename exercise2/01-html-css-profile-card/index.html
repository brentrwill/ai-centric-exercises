<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Profile Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <article class="profile-card">
      <div class="avatar" aria-label="Profile initials">JS</div>
      <section class="profile-content">
        <p class="eyebrow">Bootcamp Student</p>
        <h1>Jordan Smith</h1>
        <p class="title">Aspiring Front-End Developer</p>
        <p class="bio">I enjoy building clean, accessible websites and learning how HTML and CSS work together to create professional user experiences.</p>
        <ul class="skills" aria-label="Skills">
          <li>HTML</li><li>CSS</li><li>Flexbox</li><li>Responsive Design</li>
        </ul>
        <div class="actions">
          <a class="button primary" href="mailto:jordan@example.com">Email Me</a>
          <a class="button secondary" href="#portfolio">Portfolio</a>
        </div>
      </section>
    </article>
  </main>
</body>
</html>
