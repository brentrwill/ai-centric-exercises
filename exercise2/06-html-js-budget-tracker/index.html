<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Budget Tracker</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><h1>Budget Tracker</h1><section class="summary"><article><span>Income</span><strong id="income">$0.00</strong></article><article><span>Expenses</span><strong id="expenses">$0.00</strong></article><article><span>Balance</span><strong id="balance">$0.00</strong></article></section><form id="transactionForm"><input id="description" placeholder="Description" required><input id="amount" type="number" step="0.01" placeholder="Amount" required><select id="type"><option value="income">Income</option><option value="expense">Expense</option></select><button>Add Transaction</button></form><table><thead><tr><th>Description</th><th>Type</th><th>Amount</th><th></th></tr></thead><tbody id="transactions"></tbody></table></main><script src="script.js"></script></body></html>
